# ============================================================
# SBI EMS - Application Configuration
# DevSecOps Training | State Bank of India
#
# SECURITY NOTICE:
# All sensitive values MUST come from environment variables or Vault.
# Never hardcode passwords, secrets, or keys in this file.
# See: .env.example for required environment variables.
# ============================================================

# --- Profile ---
spring.profiles.active=dev

# --- Server ---
server.port=${SERVER_PORT:8080}

# --- Application Info ---
ems.app.name=SBI Employee Management System
ems.app.version=1.0.0

info.app.name=SBI EMS API
info.app.version=1.0.0
info.app.description=Employee Management System REST API - DevSecOps Training

# --- Database (H2 in-memory for dev/test) ---
spring.datasource.url=${DB_URL:jdbc:h2:mem:emsdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.driver-class-name=${DB_DRIVER:org.h2.Driver}
spring.datasource.username=${DB_USER:sa}
spring.datasource.password=${DB_PASSWORD:}

# --- H2 Console ---
spring.h2.console.enabled=false
spring.h2.console.path=/h2-console

# --- JPA / Hibernate ---
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# --- JWT ---
# Secret MUST come from environment
jwt.secret=${JWT_SECRET:CHANGE_THIS_IN_PRODUCTION}
jwt.expiration.ms=${JWT_EXPIRATION_MS:3600000}

# --- Actuator (RESTRICTED) ---
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when_authorized
management.endpoint.health.probes.enabled=true

# --- Logging ---
logging.level.root=WARN
logging.level.com.sbi.ems=INFO
logging.level.org.springframework.security=WARN
logging.file.name=logs/sbi-ems.log
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# --- OpenAPI / Swagger ---
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# --- Security Misc ---
spring.mvc.hiddenmethod.filter.enabled=false