# ============================================================
# PRODUCTION PROFILE - application-prod.properties
# Activate with: SPRING_PROFILES_ACTIVE=prod
# All secrets injected via environment variables or Vault.
# ============================================================

# Database - from Vault or env
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA - no DDL in prod; use Flyway or Liquibase
spring.jpa.hibernate.ddl-auto=none
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=false

# H2 console - DISABLED in prod
spring.h2.console.enabled=false

# Swagger - DISABLED in prod (attack surface)
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

# Actuator - health only in prod
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# Logging - minimal in prod
logging.level.root=WARN
logging.level.com.sbi.ems=INFO

# JWT - from Vault/env
jwt.secret=${JWT_SECRET}
jwt.expiration.ms=1800000