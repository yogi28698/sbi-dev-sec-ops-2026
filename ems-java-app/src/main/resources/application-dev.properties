# ============================================================
# DEV PROFILE - application-dev.properties
# Activate with: spring.profiles.active=dev
# DevSecOps: Dev profile enables H2 console and Swagger. Never in prod.
# ============================================================

# H2 console - dev only
spring.h2.console.enabled=true

# Show SQL - dev only for debugging
spring.jpa.show-sql=false

# Verbose security logging - dev only
logging.level.com.sbi.ems=DEBUG
logging.level.org.springframework.security=INFO

# JWT secret for dev
# Reads from JWT_SECRET env var if set,
# falls back to a dev-only default (never use in production).
# Generate a real key: openssl rand -hex 32
jwt.secret=${JWT_SECRET:dev-default-secret-32bytes-changeMe!}

# Actuator - slightly more endpoints in dev
management.endpoints.web.exposure.include=health,info,metrics,loggers